name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="/root/.bun/bin:/usr/bin:/usr/local/bin:/bin:/usr/sbin:/sbin:$PATH"
            bash /var/www/falcon/deploy.sh
